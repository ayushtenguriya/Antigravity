version: "3.9"

networks:
  job-portal-network:
    driver: bridge

services:

  # ─── 1. Eureka Service Discovery ───────────────────────────────────────────
  eureka-server:
    build:
      context: ./backend/eureka-server
      dockerfile: Dockerfile
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - job-portal-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── 2. User Service ───────────────────────────────────────────────────────
  user-service:
    build:
      context: ./backend/user-service
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "8081:8081"
    networks:
      - job-portal-network
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── 3. Job Service ────────────────────────────────────────────────────────
  job-service:
    build:
      context: ./backend/job-service
      dockerfile: Dockerfile
    container_name: job-service
    ports:
      - "8082:8082"
    networks:
      - job-portal-network
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── 4. Application Service ────────────────────────────────────────────────
  application-service:
    build:
      context: ./backend/application-service
      dockerfile: Dockerfile
    container_name: application-service
    ports:
      - "8083:8083"
    networks:
      - job-portal-network
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy
      job-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy

  # ─── 5. Notification Service ───────────────────────────────────────────────
  notification-service:
    build:
      context: ./backend/notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    ports:
      - "8084:8084"
    networks:
      - job-portal-network
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── 6. API Gateway (last — depends on all services) ──────────────────────
  api-gateway:
    build:
      context: ./backend/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    networks:
      - job-portal-network
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy
      user-service:
        condition: service_healthy
      job-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
